    <title>My Photo Gallery</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            background-color: #f4f4f4;
        }

        #gallery {
            position: relative;
            max-width: 600px;
            overflow: hidden;
        }

        .slider {
            display: flex;
            transition: transform 0.5s ease-in-out;
        }

        .slide {
            min-width: 100%;
        }

        .slide img {
            max-height: 625px; /* Adjust the value to your desired height */
            width: auto; /* Maintain aspect ratio */
            display: block; /* Remove extra space under the image */
            margin: 0 auto; /* Center the image within the slide */
        }

        #prev, #next {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            font-size: 24px;
            cursor: pointer;
            color: white;
            background-color: #002856;
            padding: 10px;
        }

        #prev {
            left: 10px;
        }

        #next {
            right: 10px;
        }
    </style>
